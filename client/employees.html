<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сотрудники - Система оценки персонала</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Сотрудники</h1>
  </header>

  <nav>
    <a href="employees.html"class="active">Сотрудники</a>
    <a href="criteria.html">Критерии</a>
    <a href="evaluate.html">Оценка</a> 
    <a href="reports.html">Отчёты</a>
    <a href="#" onclick="logout(); return false;">Выход</a>
  </nav>

  <main>
    <div class="toolbar">
      <button onclick="showAddEmployeeModal()">Добавить сотрудника</button>
      <button onclick="loadEmployeesPage()">Обновить</button>
    </div>

    <table id="employeesTable">
      <thead>
        <tr>
          <th>ФИО</th>
          <th>Должность</th>
          <th>Отдел</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody>
        <!-- Данные загружаются через JavaScript -->
      </tbody>
    </table>
  </main>

  <!-- Модальное окно для добавления/редактирования -->
  <div id="addEmployeeModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Добавить сотрудника</h2>
      <form onsubmit="handleSaveEmployee(event)">
        <input type="hidden" id="employeeId" />
        
        <div class="form-group">
          <label for="fullName">ФИО *</label>
          <input type="text" id="fullName" required placeholder="Иванов Иван Иванович" />
        </div>

        <div class="form-group">
          <label for="position">Должность</label>
          <input type="text" id="position" placeholder="Разработчик" />
        </div>

        <div class="form-group">
          <label for="department">Отдел</label>
          <input type="text" id="department" placeholder="ИТ" />
        </div>

        <div class="form-actions">
          <button type="submit">Сохранить</button>
          <button type="button" onclick="closeAddEmployeeModal()">Отмена</button>
        </div>
      </form>
    </div>
  </div>

  <script>
  // Проверка доступа при загрузке
  if (!checkPageAccess(['admin', 'HR'])) {
    // Уже перенаправлено в checkPageAccess
  }
  
  // Обновляем навигацию
  document.addEventListener('DOMContentLoaded', updateNavigation)
</script>

  <!-- Подключение скриптов (ВАЖНЫЙ ПОРЯДОК!) -->
  <script src="/lib/chart.4.4.3.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>

  <footer>
    © Друзенко А.С., 2026
  </footer>
</body>
</html>
